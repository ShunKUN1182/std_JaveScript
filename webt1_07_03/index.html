<!doctype html>
<html lang="ja">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>マウスカーソルの位置によって変えろ！！！</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            .btn {
                margin: 300px auto;
                width: 300px;
                height: 100px;
                border: 2px solid #000;
                background-color: tomato;
                display: flex;
                justify-content: center;
                align-items: center;
                position: relative;
                overflow: hidden;
                transition: 0.4s;
                p {
                    position: absolute;
                    top: 0;
                    left: 0;
                    display: flex;
                    justify-content: center;
                    align-items: center;
                    width: 100%;
                    height: 100%;
                    z-index: 100;
                    font-size: 24px;
                    font-weight: bold;
                }
                &::after {
                    content: "";
                    display: flex;
                    justify-content: center;
                    align-items: center;
                    position: absolute;
                    top: 0;
                    left: 0;
                    background-color: skyblue;
                    width: 100%;
                    height: 100%;
                    transform: translate(0, 0);
                    transition: 0.4s;
                }
            }
            .left {
                &:hover {
                    &::after {
                        transform: translate(300px, 0);
                    }
                }
            }
            .right {
                &:hover {
                    &::after {
                        transform: translate(-300px, 0);
                    }
                }
            }
            .top {
                &:hover {
                    &::after {
                        transform: translate(0, 100px);
                    }
                }
            }
            .bottom {
                &:hover {
                    &::after {
                        transform: translate(0, -100px);
                    }
                }
            }
        </style>
        <script defer src="js/index.js"></script>
    </head>
    <body>
        <div class="btn right"><p>ボタンよ</p></div>
    </body>
</html>

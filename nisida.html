<!doctype html>
<html lang="ja">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Document</title>
        <style>
            div {
                margin: 300px auto;
                width: 500px;
                height: 300px;
                background-color: tomato;
                position: relative;
                &::after {
                    content: "";
                    position: absolute;
                    top: 50%;
                    right: 20px;
                    transform: translateY(-50%);
                    background-color: skyblue;
                    width: 100px;
                    height: 100px;
                    border-radius: 100%;
                }
            }
        </style>
    </head>
    <body>
        <div></div>
    </body>
</html>
